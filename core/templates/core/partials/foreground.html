{% load static %}
<div class="cards-wrapper">
  <div class="cards-container">
    <div class="cards-scroll">
      {% for project in projects %}
      <article class="card">
        <div class="card-inner">
          <h3>{{ project.title }}</h3>
          <p>{{ project.description }}</p>
        </div>
      </article>
      {% empty %}
      <p>No projects yet.</p>
      {% endfor %}
    </div>
  </div>
</div>
